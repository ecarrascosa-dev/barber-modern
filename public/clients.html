<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Modern</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-100">
    <header class="absolute z-10 bg-indigo-950 text-white w-64 min-h-screen overflow-y-auto transition-transform transform -translate-x-full ease-in-out duration-300 shadow-xl" 
        id="sidebar">
        <div class="p-4">
            <h1 class="text-3xl font-bold text-center">Barber<span class="text-indigo-400">Modern</span></h1>
            <ul class="mt-10">
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="/">Home</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="/clients.html">Clientes</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="#">Agendamentos</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="#">Serviços</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="#">Funcionários</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="#">Financeiro</a></li>
                <hr>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg">Configurações</li>
            </ul>
        </div>
    </header>
    <div class="bg-indigo-950 h-20 w-full flex justify-around items-center">
        <h1 class="text-3xl text-white font-bold text-center">Barber<span class="text-indigo-400">Modern</span></h1>
        <button class="text-gray-500 hover:text-gray-600" id="open-sidebar">
            <svg class="w-6 h-6" fill="none" stroke="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
    </div>
    <main class="py-8 px-5">
        <div class="w-full max-w-md rounded-2xl bg-white p-8 mb-10 shadow-sm border border-zinc-100">
            <div class="mb-6 text-center">
                <h2 class="text-2xl font-bold text-zinc-900 tracking-tight">Novo Cliente</h2>
                <p class="text-sm text-zinc-500 mt-1">Preencha os dados para realizar o cadastro.</p>
            </div>

            <form id="formRegisterClient" class="space-y-5">
                <div>
                    <label for="nameClient" class="block text-sm font-medium text-zinc-700 mb-1.5"> Nome Completo </label>
                    <input type="text" id="nameClient" name="nameClient" required placeholder="Ex: João Silva" class="w-full rounded-xl border border-zinc-200 bg-white px-4 py-3 text-sm text-zinc-900 placeholder-zinc-400 focus:border-indigo-200 focus:outline-none focus:ring-2 focus:ring-purple-100 transition duration-200"/>
                </div>
                <div>
                    <label for="phoneClient" class="block text-sm font-medium text-zinc-700 mb-1.5">WhatsApp / Celular</label>
                    <input type="tel" id="phoneClient" name="phoneClient" required placeholder="Ex: (11) 99999-9999"class="w-full rounded-xl border border-zinc-200 bg-white px-4 py-3 text-sm text-zinc-900 placeholder-zinc-400 focus:border-indigo-200 focus:outline-none focus:ring-2 focus:ring-purple-100 transition duration-200"/>
                </div>
                <p id="statusClient"></p>
                <button id="" type="submit" class="w-full rounded-xl bg-indigo-600 py-3 text-sm font-semibold text-white hover:bg-indigo-800 active:scale-[0.98] transition duration-200 shadow-sm shadow-purple-200 mt-2">Cadastrar Cliente</button>
            </form>
        </div>
        <div class="mx-auto max-w-5xl">
            <div class="flex justify-center mb-4">
                <div>
                    <h1 class="text-2xl font-bold text-zinc-900 tracking-tight">Clientes Cadastrados</h1>
                    <p class="text-sm text-zinc-500 mt-1">Gerencie a lista de clientes da barbearia.</p>
                </div>
            </div>
            <div class="overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse text-left text-sm text-zinc-500">
                        <thead class="bg-zinc-50 text-xs font-semibold uppercase tracking-wider text-zinc-700 border-b border-zinc-200">
                            <tr>
                                <th scope="col" class="px-6 py-4">Nome do Cliente</th>
                                <th scope="col" class="px-6 py-4">WhatsApp / Celular</th>
                                <th scope="col" class="px-6 py-4 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tableClients" class="divide-y divide-zinc-100">
                            
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script src="js/clients.js"></script>
    <script src="js/toolsIndex.js"></script>
</body>
</html>
