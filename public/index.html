<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Modern</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-100">
    <header class="absolute z-10 bg-indigo-950 text-white w-64 min-h-screen overflow-y-auto transition-transform transform -translate-x-full ease-in-out duration-300 shadow-xl" 
        id="sidebar">
        <div class="p-4">
            <h1 class="text-3xl font-bold text-center">Barber<span class="text-indigo-400">Modern</span></h1>
            <ul class="mt-10">
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="/">Home</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="/clients">Clientes</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="#">Agendamentos</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="#">Serviços</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="#">Funcionários</a></li>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg"><a href="#">Financeiro</a></li>
                <hr>
                <li class="text-xl py-4 pl-3 hover:bg-indigo-500/40 w-[90%] rounded-e-lg">Configurações</li>
            </ul>
        </div>
    </header>
    <div class="bg-indigo-950 h-20 w-full flex justify-around items-center">
        <h1 class="text-3xl text-white font-bold text-center">Barber<span class="text-indigo-400">Modern</span></h1>
        <button class="text-gray-500 hover:text-gray-600" id="open-sidebar">
            <svg class="w-6 h-6" fill="none" stroke="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
    </div>

    <main class="py-8 px-5">
        <h1 class="font-bold text-4xl">Bem-vindo, User!</h1>
        <p>Aqui está o resumo da sua barbearia</p>
            <section id="sectionResumo" class="flex flex-col gap-y-5 justify-center pt-5">
                <div class="bg-white w-full h-32 shadow-lg rounded-lg flex items-center p-5">
                    <div>
                        <div class="bg-blue-800/15 w-20 h-20 rounded-[100%] flex justify-center items-center">
                            <img src="assets/images/peopleSectionResumo.svg" alt="Descrição do ícone" width="60" height="60">
                        </div>
                    </div>
                    <div class="pl-6">
                        <h2 id="counterClients" class="font-bold text-3xl"></h2>
                        <p class="text-xl">Clientes</p>
                    </div>
                </div>
                <div class="bg-white w-full h-32 shadow-lg rounded-lg flex items-center p-5">
                    <div>
                        <div class="bg-green-400/15 w-20 h-20 rounded-[100%] flex justify-center items-center">
                            <img src="assets/images/dateSectionResume.svg" alt="Descrição do ícone" width="60" height="60">
                        </div>
                    </div>
                    <div class="pl-6">
                        <h2 class="font-bold text-3xl">99</h2>
                        <p class="text-xl">Agendamentos Hoje</p>
                    </div>
                </div>
                <button id="buttonSeeMore" class="cursor-pointer relative z-0 bottom-30 h-36 w-full pt-20 bg-linear-to-t from-zinc-100 from-40% to-blue-500/0">
                    Ver Mais
                </button>
                <div id="contentSeeMore" class="hidden">
                    <div class="bg-white w-full h-32 shadow-lg rounded-lg flex items-center p-5 mb-5">
                        <div>
                            <div class="bg-orange-600/15 w-20 h-20 rounded-[100%] flex justify-center items-center">
                                <img src="assets/images/moneySectionResume.svg" alt="Descrição do ícone" width="60" height="60">
                            </div>
                        </div>
                        <div class="pl-6">
                            <h2 class="font-bold text-3xl">99</h2>
                            <p class="text-xl">Faturamento Hoje</p>
                        </div>
                    </div>
                    <div class="bg-white w-full h-32 shadow-lg rounded-lg flex items-center p-5">
                        <div>
                            <div class="bg-purple-600/15 w-20 h-20 rounded-[100%] flex justify-center items-center">
                                <img src="assets/images/personSectionResume.svg" alt="Descrição do ícone" width="60" height="60">
                            </div>
                        </div>
                        <div class="pl-6">
                            <h2 class="font-bold text-3xl">99</h2>
                            <p class="text-xl">Funcionarios</p>
                        </div>
                    </div>
                </div>
                <button id="buttonSeeLess" class="hidden cursor-pointer relative z-0 bottom-8 h-14 pt-5 w-full bg-linear-to-t from-zinc-100 from-70% to-blue-500/0">
                    Ver Menos
                </button>
            </section>
    </main>

    <script src="js/index.js"></script>
    <script src="js/toolsIndex.js"></script>
</body>
</html>
